name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy webhook
        run: |
          curl -s -o /tmp/deploy-response.json -w "%{http_code}" \
            -X POST https://vzla.site/deploy-hook.php \
            -H "X-Deploy-Secret: ${{ secrets.DEPLOY_SECRET }}" \
            --max-time 30 \
            --retry 3 \
            --retry-delay 5 > /tmp/http_code.txt

          HTTP_CODE=$(cat /tmp/http_code.txt)
          RESPONSE=$(cat /tmp/deploy-response.json)

          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $RESPONSE"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Deploy webhook failed with status $HTTP_CODE"
            exit 1
          fi

          echo "Deploy triggered successfully"
