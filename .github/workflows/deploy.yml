name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: "82.29.169.39 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIHk76JHNWLZOI+T3xOwZtad6YBn51O80bQcz03eGuJYb"
          timeout: 120s
          command_timeout: 20m
          script: bash /home/vzla.site/deploy.sh
