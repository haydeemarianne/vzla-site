name: Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias JS
        run: npm ci

      - name: Verificar que el build no esta roto
        run: npm run build

      - name: Disparar deploy en servidor
        run: |
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST https://vzla.site/deploy-hook.php \
            -H "X-Deploy-Secret: ${{ secrets.DEPLOY_SECRET }}" \
            --max-time 30 --retry 3 --retry-delay 5)
          echo "Webhook response: $HTTP"
          [ "$HTTP" = "200" ] || exit 1
